<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigation Workspace | Federal Risk Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Using system fonts to avoid external font CSP violations */body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .section-card { background: #1e2937; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-emerald-500 text-white rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-lg"></i>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">Federal Risk Explorer</span>
                </a>
                <div class="flex items-center gap-x-4 text-sm">
                    <a href="explorer/federal-risk-explorer.html" class="text-slate-300 hover:text-white">Risk Explorer</a>
                    <a href="contract-trace.html" class="text-slate-300 hover:text-white">Contract Trace</a>
                    <a href="bill-analyzer.html" class="text-slate-300 hover:text-white">Bill Analyzer</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-semibold tracking-tight">Investigation Workspace</h1>
        <p class="text-slate-400 mt-2">Manage all your saved traces, bill analyses, and investigations in one place. Data is stored locally and can be synced via the backend stub.</p>

        <div class="mt-8 flex gap-x-4">
            <button onclick="loadSavedItems()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium">Refresh List</button>
            <button onclick="exportAllSaved()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-2xl text-sm font-medium">Export All as JSON</button>
            <button onclick="clearAllSaved()" class="px-6 py-2 bg-red-900 hover:bg-red-800 rounded-2xl text-sm font-medium">Clear All Local Data</button>
        </div>

        <div id="workspace-list" class="mt-8 grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        function loadSavedItems() {
            const container = document.getElementById('workspace-list');
            container.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('savedInvestigations') || '[]');

            if (saved.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400">No saved investigations yet. Use the "Save This Investigation" buttons in the tools.</div>`;
                return;
            }

            saved.forEach(item => {
                const div = document.createElement('div');
                div.className = 'section-card rounded-3xl p-6';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xs uppercase tracking-wider text-emerald-400">${item.type.toUpperCase()}</div>
                            <h3 class="font-semibold text-lg mt-1">${item.title}</h3>
                            <div class="text-xs text-slate-400 mt-1">${new Date(item.savedAt).toLocaleString()}</div>
                        </div>
                        <button onclick="deleteSavedItem(${item.id}, this)" class="text-red-400 hover:text-red-300 text-sm">Delete</button>
                    </div>
                    <div class="mt-4 flex gap-x-2">
                        <button onclick="viewSavedItem(${item.id})" class="flex-1 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm">View Details</button>
                        <button onclick="loadInTool(${item.id})" class="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm">Open in Tool</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function deleteSavedItem(id, btn) {
            if (!confirm('Delete this saved investigation?')) return;
            let saved = JSON.parse(localStorage.getItem('savedInvestigations') || '[]');
            saved = saved.filter(s => s.id !== id);
            localStorage.setItem('savedInvestigations', JSON.stringify(saved));
            btn.closest('.section-card').remove();
        }

        function viewSavedItem(id) {
            const saved = JSON.parse(localStorage.getItem('savedInvestigations') || '[]');
            const item = saved.find(s => s.id === id);
            if (!item) return;
            alert(JSON.stringify(item, null, 2).substring(0, 800) + '\n\n(Full data available in console)');
            console.log('Full saved item:', item);
        }

        function loadInTool(id) {
            const saved = JSON.parse(localStorage.getItem('savedInvestigations') || '[]');
            const item = saved.find(s => s.id === id);
            if (!item) return;

            if (item.type === 'bill') {
                localStorage.setItem('pendingLoadBill', JSON.stringify(item.data));
                window.location.href = 'bill-analyzer.html?load=saved';
            } else {
                localStorage.setItem('pendingLoadTrace', JSON.stringify(item.data));
                window.location.href = 'contract-trace.html?load=saved';
            }
        }

        function exportAllSaved() {
            const saved = localStorage.getItem('savedInvestigations') || '[]';
            const blob = new Blob([saved], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'investigation-workspace-export.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAllSaved() {
            if (confirm('Clear ALL saved investigations from this browser?')) {
                localStorage.removeItem('savedInvestigations');
                loadSavedItems();
            }
        }

        // Auto load on page
        window.onload = () => {
            loadSavedItems();
        };
    </script>
</body>
</html>
