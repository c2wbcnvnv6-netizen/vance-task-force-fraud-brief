<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="50%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield -->
  <path d="M100 5 L180 35 L180 110 Q180 160 100 220 Q20 160 20 110 L20 35 Z" 
        fill="url(#shieldGrad)" stroke="#374151" stroke-width="8"/>
  <path d="M100 5 L180 35 L180 110 Q180 160 100 220 Q20 160 20 110 L20 35 Z" 
        fill="none" stroke="#9ca3af" stroke-width="2" opacity="0.6"/>
  
  <!-- Inner grid lines (cyber) -->
  <g stroke="#4b5563" stroke-width="0.8" opacity="0.7">
    <line x1="40" y1="50" x2="160" y2="50"/>
    <line x1="40" y1="80" x2="160" y2="80"/>
    <line x1="40" y1="110" x2="160" y2="110"/>
    <line x1="60" y1="35" x2="60" y2="140"/>
    <line x1="100" y1="35" x2="100" y2="150"/>
    <line x1="140" y1="35" x2="140" y2="140"/>
  </g>
  
  <!-- T.F.F. Letters -->
  <text x="100" y="105" font-family="Inter, sans-serif" font-size="42" font-weight="700" 
        fill="url(#metal)" text-anchor="middle" letter-spacing="2">T.F.F.</text>
  
  <!-- Red accents and lock elements -->
  <path d="M35 55 L50 45" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M165 55 L150 45" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small chain links -->
  <g fill="none" stroke="#ef4444" stroke-width="2">
    <path d="M30 140 Q40 150 50 140"/>
    <path d="M150 140 Q160 150 170 140"/>
  </g>
  
  <!-- Glow line -->
  <line x1="25" y1="70" x2="175" y2="70" stroke="#ef4444" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Tagline area (for reference, usually below) -->
</svg>